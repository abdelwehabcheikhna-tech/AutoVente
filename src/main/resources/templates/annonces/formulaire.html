<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>

<div th:replace="~{fragments/navigation :: navigation}"></div>

<div class="container mt-4 mb-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-header bg-gradient text-white text-center rounded-4 rounded-bottom-0"
             style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
          <h3 class="mb-0">
            <span th:if="${annonce.id == null}">📝 Déposer une annonce</span>
            <span th:unless="${annonce.id == null}">✏️ Modifier l'annonce</span>
          </h3>
          <p class="mb-0">Remplissez tous les champs pour mettre en vente votre véhicule</p>
        </div>
        <div class="card-body p-4">
          <div th:if="${success}" class="alert alert-success">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
          </div>
          <div th:if="${error}" class="alert alert-danger">
            <i class="fas fa-exclamation-triangle"></i> <span th:text="${error}"></span>
          </div>

          <form th:action="@{/annonces/save}" th:object="${annonce}" method="post">
            <input type="hidden" th:field="*{id}">

            <h5 class="mb-3"><i class="fas fa-info-circle"></i> Informations générales</h5>
            <div class="mb-3">
              <label class="form-label fw-semibold">Titre de l'annonce *</label>
              <input type="text" th:field="*{titre}" class="form-control rounded-pill"
                     placeholder="Ex: Superbe Toyota Corolla 2020" required>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Description *</label>
              <textarea th:field="*{description}" class="form-control" rows="4"
                        placeholder="Décrivez votre véhicule..." required></textarea>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Prix (MRU) *</label>
                <input type="number" step="0.01" th:field="*{prix}" class="form-control rounded-pill"
                       placeholder="Ex: 5000000" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Kilométrage *</label>
                <input type="number" th:field="*{vehicule.kilometrage}" class="form-control rounded-pill"
                       placeholder="Ex: 45000" required>
              </div>
            </div>

            <h5 class="mb-3 mt-4"><i class="fas fa-car"></i> Informations véhicule</h5>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Marque *</label>
                <select th:field="*{vehicule.marque.id}" id="marqueSelect" class="form-select rounded-pill" required>
                  <option value="">-- Sélectionnez une marque --</option>
                  <option th:each="m : ${marques}" th:value="${m.id}" th:text="${m.nom}"></option>
                </select>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Modèle *</label>
                <select th:field="*{vehicule.modele.id}" id="modeleSelect" class="form-select rounded-pill" required>
                  <option value="">-- Sélectionnez d'abord une marque --</option>
                </select>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Année *</label>
                <input type="number" th:field="*{vehicule.annee}" class="form-control rounded-pill"
                       placeholder="Ex: 2020" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Carburant *</label>
                <select th:field="*{vehicule.carburant}" class="form-select rounded-pill" required>
                  <option value="ESSENCE">Essence</option>
                  <option value="DIESEL">Diesel</option>
                  <option value="ELECTRIQUE">Électrique</option>
                  <option value="HYBRIDE">Hybride</option>
                </select>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Transmission</label>
                <select th:field="*{vehicule.transmission}" class="form-select rounded-pill">
                  <option value="MANUELLE">Manuelle</option>
                  <option value="AUTOMATIQUE">Automatique</option>
                </select>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Couleur</label>
                <input type="text" th:field="*{vehicule.couleur}" class="form-control rounded-pill"
                       placeholder="Ex: Rouge, Bleu...">
              </div>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
              <a th:href="@{/annonces}" class="btn btn-secondary rounded-pill px-4">
                <i class="fas fa-times"></i> Annuler
              </a>
              <button type="submit" class="btn btn-gradient rounded-pill px-4">
                <i class="fas fa-save"></i> Publier l'annonce
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/scripts :: scripts}"></div>

<!-- Script pour charger dynamiquement les modèles -->
<script>
  $(document).ready(function() {
    // Remplir les options du modèle lorsque la marque change
    $('#marqueSelect').on('change', function() {
      var marqueId = $(this).val();
      var modeleSelect = $('#modeleSelect');

      if (marqueId) {
        // Nettoyer la liste des modèles
        modeleSelect.empty();
        modeleSelect.append('<option value="">-- Chargement des modèles... --</option>');

        // Appel AJAX pour récupérer les modèles
        $.ajax({
          url: '/api/modeles/by-marque/' + marqueId,
          type: 'GET',
          dataType: 'json',
          success: function(data) {
            modeleSelect.empty();
            if (data.length > 0) {
              modeleSelect.append('<option value="">-- Sélectionnez un modèle --</option>');
              $.each(data, function(index, modele) {
                modeleSelect.append('<option value="' + modele.id + '">' + modele.nom + '</option>');
              });
            } else {
              modeleSelect.append('<option value="">-- Aucun modèle disponible --</option>');
            }
          },
          error: function(xhr, status, error) {
            console.error("Erreur lors du chargement des modèles:", error);
            modeleSelect.empty();
            modeleSelect.append('<option value="">-- Aucun modèle disponible --</option>');
          }
        });
      } else {
        modeleSelect.empty();
        modeleSelect.append('<option value="">-- Sélectionnez d\'abord une marque --</option>');
      }
    });

    //   }

  });
</script>

</body>
</html>
