<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head}"></head>
<body>

<div th:replace="~{fragments/navigation :: navigation}"></div>

<div class="container mt-4 mb-5">
  <div class="row">
    <!-- Sidebar -->
    <div class="col-md-3 mb-4">
      <div class="card shadow-sm border-0 rounded-4 text-center p-3">
        <div class="mb-3">
          <i class="fas fa-user-circle fa-5x text-primary"></i>
        </div>
        <h5 sec:authentication="name">Username</h5>
        <p class="text-muted small">Membre depuis <span id="dateMembre"></span></p>
        <hr>
        <div class="d-grid gap-2">
          <button class="btn btn-outline-primary rounded-pill" onclick="showTab('info')">
            <i class="fas fa-user"></i> Mes infos
          </button>
          <button class="btn btn-outline-secondary rounded-pill" onclick="showTab('annonces')">
            <i class="fas fa-car"></i> Mes annonces
          </button>
          <button class="btn btn-outline-secondary rounded-pill" onclick="showTab('favoris')">
            <i class="fas fa-heart"></i> Favoris
          </button>
          <button class="btn btn-outline-danger rounded-pill" th:href="@{/logout}">
            <i class="fas fa-sign-out-alt"></i> Déconnexion
          </button>
        </div>
      </div>
    </div>

    <!-- Contenu principal -->
    <div class="col-md-9">
      <!-- Onglet Informations personnelles -->
      <div id="tab-info" class="tab-content">
        <div class="card shadow-sm border-0 rounded-4">
          <div class="card-header bg-gradient text-white rounded-top-4">
            <h5 class="mb-0"><i class="fas fa-user-edit"></i> Mes informations personnelles</h5>
          </div>
          <div class="card-body p-4">
            <div th:if="${success}" class="alert alert-success">
              <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
            </div>
            <div th:if="${error}" class="alert alert-danger">
              <i class="fas fa-exclamation-triangle"></i> <span th:text="${error}"></span>
            </div>
            <form th:action="@{/profil/update}" th:object="${user}" method="post">
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-semibold">Nom</label>
                  <input type="text" th:field="*{nom}" class="form-control rounded-pill" required>
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-semibold">Prénom</label>
                  <input type="text" th:field="*{prenom}" class="form-control rounded-pill" required>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" th:field="*{email}" class="form-control rounded-pill" readonly disabled>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Téléphone</label>
                <input type="tel" th:field="*{telephone}" class="form-control rounded-pill" placeholder="77 123 45 67">
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Adresse</label>
                <textarea th:field="*{adresse}" class="form-control" rows="2" placeholder="Votre adresse"></textarea>
              </div>
              <button type="submit" class="btn btn-gradient rounded-pill px-4">
                <i class="fas fa-save"></i> Mettre à jour
              </button>
            </form>

            <hr class="my-4">

            <h6><i class="fas fa-lock"></i> Changer le mot de passe</h6>
            <form th:action="@{/profil/password}" method="post" class="mt-3">
              <div class="row">
                <div class="col-md-5 mb-3">
                  <input type="password" name="oldPassword" class="form-control rounded-pill" placeholder="Ancien mot de passe" required>
                </div>
                <div class="col-md-5 mb-3">
                  <input type="password" name="newPassword" class="form-control rounded-pill" placeholder="Nouveau mot de passe" required>
                </div>
                <div class="col-md-2 mb-3">
                  <button type="submit" class="btn btn-warning rounded-pill w-100">Changer</button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>

      <!-- Onglet Mes annonces -->
      <div id="tab-annonces" class="tab-content d-none">
        <div class="card shadow-sm border-0 rounded-4">
          <div class="card-header bg-gradient text-white rounded-top-4">
            <h5 class="mb-0"><i class="fas fa-store"></i> Mes annonces</h5>
          </div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                  <th>Titre</th>
                  <th>Prix</th>
                  <th>Statut</th>
                  <th>Vues</th>
                  <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="a : ${mesAnnonces}">
                  <td th:text="${a.titre}">Titre</td>
                  <td th:text="${#numbers.formatDecimal(a.prix, 0, 0)} + ' MRU'">Prix</td>
                  <td>
                    <span class="badge bg-success" th:if="${a.statut == 'ACTIVE'}" >Active</span>
                    <span class="badge bg-secondary" th:if="${a.statut == 'VENDUE'}">Vendue</span>
                  </td>
                  <td><i class="fas fa-eye"></i> <span th:text="${a.nombreVues}">0</span></td>
                  <td>
                    <a th:href="@{/annonces/edit/{id}(id=${a.id})}" class="btn btn-sm btn-warning rounded-circle">
                      <i class="fas fa-edit"></i>
                    </a>
                    <a th:href="@{/annonces/delete/{id}(id=${a.id})}" class="btn btn-sm btn-danger rounded-circle"
                       onclick="return confirm('Supprimer cette annonce ?')">
                      <i class="fas fa-trash"></i>
                    </a>
                  </td>
                </tr>
                <tr th:if="${mesAnnonces == null or mesAnnonces.empty}">
                  <td colspan="5" class="text-center text-muted py-4">
                    <i class="fas fa-info-circle"></i> Vous n'avez pas encore d'annonces
                    <div class="mt-2">
                      <a th:href="@{/annonces/nouvelle}" class="btn btn-primary btn-sm rounded-pill">
                        <i class="fas fa-plus"></i> Déposer une annonce
                      </a>
                    </div>
                  </td>
                </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- Onglet Favoris -->
      <div id="tab-favoris" class="tab-content d-none">
        <div class="card shadow-sm border-0 rounded-4">
          <div class="card-header bg-gradient text-white rounded-top-4">
            <h5 class="mb-0"><i class="fas fa-heart"></i> Mes véhicules favoris</h5>
          </div>
          <div class="card-body p-4 text-center">
            <i class="fas fa-heart fa-4x text-muted mb-3"></i>
            <p class="text-muted">Vous n'avez pas encore de favoris</p>
            <a th:href="@{/annonces}" class="btn btn-gradient rounded-pill">
              <i class="fas fa-search"></i> Découvrir des annonces
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/scripts :: scripts}"></div>

<script>
  function showTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(tab => {
          tab.classList.add('d-none');
      });
      document.getElementById('tab-' + tabName).classList.remove('d-none');

      // Mettre à jour la date du membre
      if(tabName === 'info') {
          fetch('/api/user/profile')
              .then(response => response.json())
              .then(data => {
                  document.getElementById('dateMembre').innerText = new Date(data.dateInscription).toLocaleDateString();
              });
      }

      // Charger les annonces si nécessaire
      if(tabName === 'annonces') {
          fetch('/api/user/annonces')
              .then(response => response.json())
              .then(data => {
                  // Mettre à jour le tableau
              });
      }
  }

  // Afficher l'onglet info par défaut
  showTab('info');
</script>

</body>
</html>
