<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>

<div th:replace="~{fragments/navigation :: navigation}"></div>

<div class="container text-center py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <i class="fas fa-exclamation-triangle fa-5x text-warning mb-4"></i>
      <h1 class="display-1 fw-bold text-danger" th:text="${status} ?: '404'">404</h1>
      <h2 class="mb-3" th:text="${error} ?: 'Page non trouvée'">Page non trouvée</h2>
      <p class="text-muted mb-4" th:text="${message} ?: 'Désolé, la page que vous cherchez n\'existe pas.'">
        Désolé, la page que vous cherchez n'existe pas.
      </p>
      <a th:href="@{/}" class="btn btn-gradient rounded-pill px-4">
        <i class="fas fa-home"></i> Retour à l'accueil
      </a>
    </div>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
